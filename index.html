<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy HIP DVT Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#070b10; --bg2:#0c1018; --surface:#111820; --surface2:#162030;
  --brd:#1e2d3d; --text:#dce6f2; --text2:#8b9ab0; --dim:#6e7f8f;
  --ok:#3fb950; --warn:#e3b341; --danger:#f85149; --accent:#39d0d8;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;min-height:100vh}
.wrap{max-width:1200px;margin:0 auto;padding:16px 16px 60px}

/* login */
.login{max-width:400px;margin:12vh auto;background:var(--surface);border:1px solid var(--brd);border-radius:16px;padding:28px}
.login h1{font-size:1.15rem;margin-bottom:4px}
.login .sub{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.08em;margin-bottom:22px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:.75rem;color:var(--text2);margin-bottom:5px}
.fg input{width:100%;padding:11px 12px;background:var(--bg2);border:1px solid var(--brd);border-radius:9px;color:var(--text);font-family:var(--mono);font-size:.82rem}
.fg input:focus{outline:none;border-color:var(--accent)}
.btn{font-family:'IBM Plex Sans Thai',sans-serif;font-size:.88rem;font-weight:600;padding:10px 18px;border-radius:9px;border:1px solid var(--brd);background:var(--surface2);color:var(--text);cursor:pointer}
.btn:hover{filter:brightness(1.15)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#06222a;width:100%;padding:12px}
.btn.sm{padding:6px 12px;font-size:.78rem}
.err{color:var(--danger);font-size:.78rem;margin-top:10px;min-height:1em}

/* topbar */
.top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 0 14px;border-bottom:1px solid var(--brd);margin-bottom:18px}
.brand{font-size:1rem;font-weight:700}
.brand small{display:block;font-family:var(--mono);font-size:9px;color:var(--dim);font-weight:400;letter-spacing:.07em}
.spacer{margin-left:auto}
.badge{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:999px;border:1px solid #274c33;color:var(--ok);background:var(--surface)}
select{padding:8px 11px;background:var(--surface);border:1px solid var(--brd);border-radius:8px;color:var(--text);font-size:.82rem}

/* bed grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.bed{background:var(--surface);border:1px solid var(--brd);border-radius:14px;padding:16px;cursor:pointer;transition:border-color .15s}
.bed:hover{border-color:var(--accent)}
.bed.stale{opacity:.6}
.bed h3{font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:2px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--dim)}
.dot.on{background:var(--ok);box-shadow:0 0 8px #3fb95088}
.dot.off{background:var(--danger)}
.bed .ago{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:12px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.m{background:var(--bg2);border-radius:9px;padding:9px 11px}
.m .lbl{font-size:.68rem;color:var(--text2)}
.m .val{font-family:var(--mono);font-size:1.25rem;font-weight:600;line-height:1.3}
.m .val small{font-size:.62rem;color:var(--dim)}
.bar{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-top:7px}
.bar i{display:block;height:100%;width:0;background:var(--accent);transition:width .4s}
.pl{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:5px}

/* detail */
.detail{background:var(--surface);border:1px solid var(--brd);border-radius:14px;padding:18px;margin-bottom:16px}
.detail h2{font-size:1.05rem;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.kv{display:flex;justify-content:space-between;font-size:.82rem;color:var(--text2);padding:6px 0;border-bottom:1px dashed #16202c}
.kv b{font-family:var(--mono);color:var(--text);font-weight:600}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.two{grid-template-columns:1fr}}
.sw{width:42px;height:22px;border-radius:999px;background:var(--surface2);border:1px solid var(--brd);position:relative;cursor:pointer;flex-shrink:0}
.sw i{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#666;transition:left .2s,background .2s}
.sw.on{background:var(--ok)}
.sw.on i{left:22px;background:#fff}
.sw.ro{opacity:.45;cursor:not-allowed}
.swrow{display:flex;align-items:center;gap:11px;padding:9px 0;font-size:.85rem}
.empty{text-align:center;color:var(--dim);padding:50px 20px;font-size:.9rem}
.foot{margin-top:26px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--dim)}
.hide{display:none!important}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login" id="loginView">
  <h1>🛏️ Happy HIP DVT Monitor</h1>
  <div class="sub">INVESTIGATIONAL — NOT MEDICAL GRADE · NIA SID-10/2569</div>
  <div class="fg"><label>อีเมล</label><input id="inEmail" type="email" autocomplete="username"></div>
  <div class="fg"><label>รหัสผ่าน</label><input id="inPass" type="password" autocomplete="current-password"></div>
  <button class="btn primary" onclick="doLogin()">เข้าสู่ระบบ</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- ══ APP ══ -->
<div class="wrap hide" id="appView">
  <div class="top">
    <div class="brand">🛏️ Happy HIP DVT Monitor
      <small>INVESTIGATIONAL — NOT MEDICAL GRADE</small></div>
    <div class="spacer"></div>
    <select id="selHosp" class="hide" onchange="onHospChange()"></select>
    <span class="badge" id="roleBadge">—</span>
    <button class="btn sm" id="btnAddBed" onclick="addBed()">＋ เพิ่มเตียง</button>
    <button class="btn sm" onclick="doLogout()">ออก</button>
  </div>

  <div id="detailWrap"></div>
  <div class="grid" id="bedGrid"></div>
  <div class="empty hide" id="emptyMsg">ยังไม่มีเตียงในโรงพยาบาลนี้ — กด “＋ เพิ่มเตียง” เพื่อเริ่ม</div>

  <div class="foot">Happy HIP DVT Monitor · Web Viewer v1.0 · NIA SID-10/2569</div>
</div>

<script>
"use strict";
// ═══════════ config ═══════════
// แทนที่ 2 ค่านี้ด้วยของ project จริง (Setup Guide §4)
const FB_CONFIG = {
  apiKey:      "AIzaSyBdxM1VVim70ZFFAh-HL6lg5X3XI7Jm4Mk",
  databaseURL: "https://happy-hip-dvt-default-rtdb.asia-southeast1.firebasedatabase.app"
};
const STALE_MS = 15000;          // ไม่มีข้อมูลเกิน 15 วิ = ขาดสัญญาณ

const $ = id => document.getElementById(id);
let db=null, myRole=null, myHosp=null, curHosp=null;
let hospitals={}, beds={}, bedRef=null, selectedBed=null;

// ═══════════ auth ═══════════
function canWriteConfig(){ return ['superadmin','admin','staff'].includes(myRole); }
function canManageBeds(){ return ['superadmin','admin'].includes(myRole); }

async function doLogin(){
  const email=$('inEmail').value.trim(), pass=$('inPass').value;
  $('loginErr').textContent='';
  if(!email||!pass){ $('loginErr').textContent='กรอกอีเมลและรหัสผ่าน'; return; }
  if(typeof firebase==='undefined'){ $('loginErr').textContent='โหลด Firebase SDK ไม่ได้ — ตรวจอินเทอร์เน็ต'; return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    const cred=await firebase.auth().signInWithEmailAndPassword(email,pass);
    db=firebase.database();
    const me=await db.ref('users/'+cred.user.uid).get();
    if(!me.exists()){
      $('loginErr').textContent='บัญชีนี้ยังไม่ถูกลงทะเบียนสิทธิ์ — ติดต่อผู้ดูแลระบบ';
      await firebase.auth().signOut(); return;
    }
    myRole=me.val().role; myHosp=me.val().hospitalId||null;
    startApp();
  }catch(e){
    $('loginErr').textContent = e.code==='auth/invalid-credential'
      ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง' : e.message;
  }
}
function doLogout(){ if(typeof firebase!=='undefined'&&firebase.apps.length) firebase.auth().signOut(); location.reload(); }

// ═══════════ app boot ═══════════
async function startApp(){
  $('loginView').classList.add('hide');
  $('appView').classList.remove('hide');
  $('roleBadge').textContent = myRole.toUpperCase() + (myHosp? ' · '+myHosp : ' · ทุก รพ.');
  if(!canManageBeds()) $('btnAddBed').classList.add('hide');

  if(myRole==='superadmin'){
    const snap=await db.ref('hospitals').get();
    hospitals = snap.exists()? snap.val() : {};
    const sel=$('selHosp'); sel.innerHTML=''; sel.classList.remove('hide');
    const ids=Object.keys(hospitals);
    if(!ids.length){ $('emptyMsg').textContent='ยังไม่มีโรงพยาบาลในระบบ'; $('emptyMsg').classList.remove('hide'); return; }
    ids.forEach(id=>{
      const o=document.createElement('option');
      o.value=id; o.textContent=(hospitals[id].meta&&hospitals[id].meta.label)||id;
      sel.appendChild(o);
    });
    curHosp=ids[0]; sel.value=curHosp;
  }else{
    curHosp=myHosp;
    const snap=await db.ref('hospitals/'+curHosp+'/meta').get();
    if(snap.exists()) $('roleBadge').textContent = myRole.toUpperCase()+' · '+(snap.val().label||curHosp);
  }
  watchBeds();
}
function onHospChange(){ curHosp=$('selHosp').value; selectedBed=null; watchBeds(); }

// ═══════════ live subscription ═══════════
function watchBeds(){
  if(bedRef) bedRef.off();
  beds={}; $('bedGrid').innerHTML=''; $('detailWrap').innerHTML='';
  bedRef = db.ref('hospitals/'+curHosp+'/beds');
  bedRef.on('value', snap=>{
    beds = snap.exists()? snap.val() : {};
    renderAll(beds);
  }, err=>{
    $('emptyMsg').textContent='อ่านข้อมูลไม่ได้: '+err.message;
    $('emptyMsg').classList.remove('hide');
  });
}

// ═══════════ render (pure — testable) ═══════════
function agoText(ts){
  if(!ts) return 'ไม่เคยมีข้อมูล';
  const d=Date.now()-ts;
  if(d<STALE_MS) return 'สด · '+Math.round(d/1000)+' วิที่แล้ว';
  if(d<3600000)  return 'ขาดสัญญาณ · '+Math.round(d/60000)+' นาทีที่แล้ว';
  return 'ขาดสัญญาณ · '+Math.round(d/3600000)+' ชม.ที่แล้ว';
}
function renderAll(data){
  const ids=Object.keys(data||{}).sort();
  $('emptyMsg').classList.toggle('hide', ids.length>0);
  const g=$('bedGrid'); g.innerHTML='';
  ids.forEach(bid=>{
    const b=data[bid]||{}, live=b.live||{}, cfg=b.config||{}, meta=b.meta||{};
    const target=(cfg.pumpTargetDaily||300)*2;
    const total=live.pumpTotal||0;
    const fresh=live.ts && (Date.now()-live.ts < STALE_MS);
    const card=document.createElement('div');
    card.className='bed'+(fresh?'':' stale');
    card.onclick=()=>{ selectedBed=bid; renderAll(beds); window.scrollTo({top:0,behavior:'smooth'}); };
    card.innerHTML=
      '<h3><span class="dot '+(fresh?'on':'off')+'"></span>'+(meta.label||bid)+'</h3>'+
      '<div class="ago">'+agoText(live.ts)+'</div>'+
      '<div class="metrics">'+
        '<div class="m"><div class="lbl">มุมสะโพก</div><div class="val">'+
          (fresh? (live.hipAngle||0).toFixed(1) : '—')+'<small>°</small></div></div>'+
        '<div class="m"><div class="lbl">Pump รวมวันนี้</div><div class="val">'+
          total+'<small> / '+target+'</small></div></div>'+
      '</div>'+
      '<div class="bar"><i style="width:'+Math.min(100,total/target*100)+'%"></i></div>'+
      '<div class="pl">ซ้าย '+((live.ankleL&&live.ankleL.pump)||0)+
        '  ·  ขวา '+((live.ankleR&&live.ankleR.pump)||0)+
        '  ·  '+(live.src||'—')+'</div>';
    g.appendChild(card);
  });
  renderDetail(selectedBed && data[selectedBed] ? selectedBed : null, data);
}
function ankleBlock(name,a,fresh){
  a=a||{};
  const on = fresh && a.online;
  return '<div><div class="kv"><span><b style="color:var(--text2)">'+name+'</b></span>'+
    '<b style="color:'+(on?'var(--ok)':'var(--danger)')+'">'+(on?'เชื่อมต่อ':'ขาดการเชื่อมต่อ')+'</b></div>'+
    '<div class="kv"><span>มุม</span><b>'+(on?(a.pitch||0).toFixed(1)+'°':'—')+'</b></div>'+
    '<div class="kv"><span>จำนวนครั้ง</span><b>'+(a.pump||0)+'</b></div>'+
    '<div class="kv"><span>สัญญาณ</span><b>'+(on?(a.rssi||0)+' dBm':'—')+'</b></div>'+
    '<div class="kv"><span>ตอบกลับล่าสุด</span><b>'+(on?(a.ackAge||0)+' ms':'—')+'</b></div></div>';
}
function renderDetail(bid,data){
  const w=$('detailWrap');
  if(!bid){ w.innerHTML=''; return; }
  const b=data[bid]||{}, live=b.live||{}, cfg=b.config||{}, meta=b.meta||{};
  const fresh=live.ts && (Date.now()-live.ts < STALE_MS);
  const ro=canWriteConfig()?'':' ro';
  w.innerHTML=
    '<div class="detail"><h2><span class="dot '+(fresh?'on':'off')+'"></span>'+
      (meta.label||bid)+'<button class="btn sm" style="margin-left:auto" onclick="closeDetail()">ปิด</button></h2>'+
    '<div class="two">'+
      ankleBlock('ข้อเท้าซ้าย',live.ankleL,fresh)+
      ankleBlock('ข้อเท้าขวา',live.ankleR,fresh)+
    '</div>'+
    '<div class="kv" style="margin-top:12px"><span>แรงกดหมอน ซ้าย / ขวา</span><b>'+
      (fresh?(live.fsrL||0)+' / '+(live.fsrR||0):'—')+'</b></div>'+
    '<div class="kv"><span>อัปเดตล่าสุด</span><b>'+agoText(live.ts)+'</b></div>'+
    '<div class="swrow"><div class="sw'+(cfg.vibrationEnabled?' on':'')+ro+'" '+
      (canWriteConfig()?'onclick="toggleCfg(\''+bid+'\',\'vibrationEnabled\')"':'')+'><i></i></div>'+
      'เตือนด้วยการสั่นที่ข้อเท้า</div>'+
    '<div class="swrow"><div class="sw'+(cfg.audioEnabled?' on':'')+ro+'" '+
      (canWriteConfig()?'onclick="toggleCfg(\''+bid+'\',\'audioEnabled\')"':'')+'><i></i></div>'+
      'เตือนด้วยเสียงที่หัวเตียง</div>'+
    (canWriteConfig()?'':'<div class="pl">สิทธิ์ของคุณดูได้อย่างเดียว</div>')+
    '</div>';
}
function closeDetail(){ selectedBed=null; renderAll(beds); }

// ═══════════ writes ═══════════
async function toggleCfg(bid,key){
  if(!canWriteConfig()) return;
  const cur=(beds[bid]&&beds[bid].config&&beds[bid].config[key])||false;
  try{ await db.ref('hospitals/'+curHosp+'/beds/'+bid+'/config/'+key).set(!cur); }
  catch(e){ alert('บันทึกไม่สำเร็จ: '+e.message); }
}
async function addBed(){
  if(!canManageBeds()) return;
  const n=Object.keys(beds||{}).length+1;
  const suggest='BED-'+String(n).padStart(2,'0');
  const name=prompt('รหัสเตียงใหม่',suggest);
  if(!name) return;
  const id=name.trim().toUpperCase().replace(/[.#$\[\]\/\s]/g,'-');
  if(beds[id]){ alert('มีเตียงนี้อยู่แล้ว'); return; }
  try{
    await db.ref('hospitals/'+curHosp+'/beds/'+id+'/meta').set({label:id,active:true,addedAt:Date.now()});
    await db.ref('hospitals/'+curHosp+'/beds/'+id+'/config').set({
      pumpTargetDaily:300,hipThreshold:30,vibrationEnabled:true,audioEnabled:true,
      reminderIntervalMin:60,quietHours:"22:00-06:00"});
  }catch(e){ alert('เพิ่มเตียงไม่สำเร็จ: '+e.message); }
}

// refresh relative timestamps once per second
setInterval(()=>{ if(Object.keys(beds).length) renderAll(beds); },1000);
</script>
</body>
</html>
